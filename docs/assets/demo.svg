<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="612" viewBox="0 0 1060 612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real wasmscout session (output captured
       verbatim from a local run against generated fixture files; long
       finding lines are soft-wrapped to fit the canvas). -->
  <rect width="1060" height="612" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">wasmscout — what can this module touch, before you run it</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> wasmscout scan sneaky-logger.wasm</text>
    <text x="24" y="92" fill="#909dab">sneaky-logger.wasm: core wasm module · 187 B · 5 section(s) · 4 import(s) · 1 export(s)</text>
    <text x="24" y="118" fill="#909dab">  target: WASI preview 1 (wasi_snapshot_preview1)</text>

    <text x="24" y="156" fill="#96d0ff">capabilities</text>
    <text x="24" y="182">  <tspan fill="#f47067">fs-write     high</tspan>    path_open, fd_write <tspan fill="#e0b543">[inferred]</tspan></text>
    <text x="24" y="208">  <tspan fill="#e0b543">fs-read      medium</tspan>  path_open</text>
    <text x="24" y="234">  fd-io        low     fd_write, fd_close</text>
    <text x="24" y="260">  clocks       low     clock_time_get</text>

    <text x="24" y="298" fill="#96d0ff">findings</text>
    <text x="24" y="324">  <tspan fill="#f47067">high[wasi.fs-write]:</tspan> file-write capability inferred from path_open, fd_write:</text>
    <text x="24" y="350">    path_open chooses rights at call time; combined with fd_write the module</text>
    <text x="24" y="376">    can write <tspan fill="#e0b543">any file it can open</tspan></text>
    <text x="24" y="402">  <tspan fill="#e0b543">medium[wasi.fs-read]:</tspan> imports 1 file-reading WASI function(s) (path_open) — the</text>
    <text x="24" y="428">    module can open and read everything under the runtime's preopens</text>

    <text x="24" y="466" fill="#909dab">summary: 1 module(s) scanned — 1 high, 1 medium, 0 low, 0 info · gate: fail-on high → <tspan fill="#f47067">FAIL</tspan></text>
    <text x="24" y="492"><tspan fill="#6cb6ff">$</tspan> echo $?   <tspan fill="#768390"># CI gate: non-zero, module refused</tspan></text>
    <text x="24" y="518" fill="#f47067">1</text>

    <text x="24" y="560"><tspan fill="#6cb6ff">$</tspan> wasmscout caps image-filter.wasm</text>
    <text x="24" y="586" fill="#909dab">image-filter.wasm: <tspan fill="#57ab5a">(none)</tspan></text>
  </g>
</svg>
